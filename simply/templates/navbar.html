<a style="text-decoration: none;" href="{% url 'home' %}">
    <h1>
        Logo
    </h1>
</a>

{% if request.user.is_authenticated %}
    <a style="text-decoration: none;" href="{% url 'logout' %}">Logout</a>
{% else %}
    <a style="text-decoration: none;" href="{% url 'login' %}">Login</a>&nbsp;
    <a style="text-decoration: none;" href="{% url 'register' %}">Register</a>
{% endif %}

<br><br>

{% if messages %}
    {% for message in messages %}
        <div class="message-{{message.tags}}" id="msg">
            {{message}}
        </div>
        <br>
    {% endfor %}
{% endif %}

<hr>
<br>
